<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#1d1c1a"/>
      <stop offset="65%" stop-color="#0e0d0c"/>
      <stop offset="100%" stop-color="#070706"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ped-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0b0ad"/>
      <stop offset="100%" stop-color="#8c8c89"/>
    </linearGradient>
    <linearGradient id="ped-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#363632"/>
      <stop offset="100%" stop-color="#1c1c19"/>
    </linearGradient>
    <filter id="ph-sh" x="-40%" y="-15%" width="180%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="floor-sh" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <!-- Ring arc clip -->
    <clipPath id="ring-clip">
      <rect x="0" y="0" width="182" height="402" rx="26"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="url(#bg)"/>
  <!-- Blue glow -->
  <ellipse cx="400" cy="290" rx="240" ry="180" fill="url(#glow)"/>

  <!-- Floor shadow -->
  <ellipse cx="400" cy="550" rx="200" ry="10" fill="#000" opacity="0.55" filter="url(#floor-sh)"/>

  <!-- Pedestal top -->
  <rect x="200" y="462" width="400" height="16" rx="2" fill="url(#ped-top)"/>
  <!-- Pedestal front -->
  <rect x="200" y="478" width="400" height="68" fill="url(#ped-front)"/>
  <line x1="200" y1="500" x2="600" y2="500" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <line x1="200" y1="522" x2="600" y2="522" stroke="#fff" stroke-opacity="0.025" stroke-width="1"/>
  <rect x="200" y="544" width="400" height="2" rx="1" fill="#fff" opacity="0.04"/>

  <!-- Phone (centered) -->
  <g filter="url(#ph-sh)">
    <!-- Body -->
    <rect x="300" y="50" width="200" height="412" rx="36" fill="#0C1829"/>
    <!-- Side button -->
    <rect x="298" y="175" width="3" height="42" rx="1.5" fill="#17243a"/>
    <!-- Volume buttons -->
    <rect x="499" y="162" width="3" height="30" rx="1.5" fill="#17243a"/>
    <rect x="499" y="198" width="3" height="30" rx="1.5" fill="#17243a"/>

    <!-- Screen -->
    <svg x="309" y="60" width="182" height="392" overflow="visible">
      <g clip-path="url(#ring-clip)">
        <!-- Screen bg -->
        <rect width="182" height="392" fill="#060D1A"/>

        <!-- Status bar -->
        <text x="12" y="18" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="rgba(255,255,255,0.85)">9:41</text>
        <text x="170" y="18" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.45)" text-anchor="end">●●● 5G</text>
        <!-- Dynamic island -->
        <rect x="66" y="4" width="50" height="13" rx="6.5" fill="#000"/>

        <!-- Date / greeting -->
        <text x="14" y="40" font-family="system-ui,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.4)">Saturday, Apr 19</text>
        <text x="14" y="55" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Good morning, Karishma</text>

        <!-- Activity ring + steps -->
        <rect x="14" y="64" width="154" height="76" rx="14" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <!-- Ring bg -->
        <circle cx="54" cy="102" r="28" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="7"/>
        <!-- Ring progress (84%) -->
        <circle cx="54" cy="102" r="28" fill="none" stroke="#3B82F6" stroke-width="7"
          stroke-dasharray="147.9 175.9" stroke-linecap="round"
          transform="rotate(-90 54 102)"/>
        <text x="54" y="105" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">84%</text>
        <!-- Steps text -->
        <text x="96" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#fff">Daily Steps</text>
        <text x="96" y="101" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#3B82F6" letter-spacing="-0.5">8,432</text>
        <text x="96" y="113" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.4)">Goal: 10,000 steps</text>
        <!-- Progress bar -->
        <rect x="96" y="118" width="62" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
        <rect x="96" y="118" width="52" height="4" rx="2" fill="#3B82F6"/>

        <!-- 4 metric cards 2x2 -->
        <!-- Heart Rate -->
        <rect x="14" y="148" width="71" height="58" rx="12" fill="rgba(16,185,129,0.12)" stroke="rgba(16,185,129,0.25)" stroke-width="1"/>
        <text x="22" y="164" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" font-weight="600">HEART RATE</text>
        <text x="22" y="182" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff">72</text>
        <text x="22" y="196" font-family="system-ui,sans-serif" font-size="7.5" fill="#10B981">BPM</text>

        <!-- Sleep -->
        <rect x="97" y="148" width="71" height="58" rx="12" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
        <text x="105" y="164" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" font-weight="600">SLEEP</text>
        <text x="105" y="182" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fff">7h 23m</text>
        <text x="105" y="196" font-family="system-ui,sans-serif" font-size="7.5" fill="#3B82F6">Last night</text>

        <!-- Calories -->
        <rect x="14" y="213" width="71" height="58" rx="12" fill="rgba(245,158,11,0.12)" stroke="rgba(245,158,11,0.25)" stroke-width="1"/>
        <text x="22" y="229" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" font-weight="600">CALORIES</text>
        <text x="22" y="247" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#fff">1,847</text>
        <text x="22" y="261" font-family="system-ui,sans-serif" font-size="7.5" fill="#F59E0B">kcal</text>

        <!-- Recovery -->
        <rect x="97" y="213" width="71" height="58" rx="12" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
        <text x="105" y="229" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.5)" font-weight="600">RECOVERY</text>
        <text x="105" y="247" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#fff">78</text>
        <text x="105" y="261" font-family="system-ui,sans-serif" font-size="7.5" fill="#8B5CF6">/100</text>

        <!-- Insight card -->
        <rect x="14" y="279" width="154" height="52" rx="12" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
        <text x="22" y="296" font-family="system-ui,sans-serif" font-size="7" fill="#3B82F6" font-weight="700">TODAY'S INSIGHT</text>
        <text x="22" y="310" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#fff">Well-rested. Good day for a hard workout.</text>
        <text x="22" y="323" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.45)">Recovery 78 · HRV 52ms · Sleep quality 82/100</text>

        <!-- Tab bar -->
        <rect x="0" y="352" width="182" height="40" fill="rgba(6,13,26,0.97)"/>
        <line x1="0" y1="352" x2="182" y2="352" stroke="rgba(255,255,255,0.07)" stroke-width="0.5"/>
        <!-- Today active -->
        <rect x="8" y="356" width="28" height="3" rx="1.5" fill="#3B82F6"/>
        <text x="22" y="372" font-family="system-ui,sans-serif" font-size="7" fill="#3B82F6" font-weight="700" text-anchor="middle">Today</text>
        <!-- Activity -->
        <rect x="54" y="356" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
        <text x="63" y="372" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">Activity</text>
        <!-- Health -->
        <rect x="100" y="356" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
        <text x="109" y="372" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">Health</text>
        <!-- Workouts -->
        <rect x="146" y="356" width="18" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>
        <text x="155" y="372" font-family="system-ui,sans-serif" font-size="7" fill="rgba(255,255,255,0.35)" text-anchor="middle">Workouts</text>
      </g>
    </svg>
  </g>


</svg>
